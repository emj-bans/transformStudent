
<!DOCTYPE html>
<html>
	<head>
		<title>Transition and Animation Exercises</title>
		<meta charset="UTF-8">
		<meta name="description" content="Sample Code to implement transform and transition">
	    <meta name="author" content="A.L. Mendoza & M.Tarcelo">
	    <meta name="revised" content="12/04/2022">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<style>
			* {
				box-sizing: border-box;
			}
			#deck{
				width: 50vw;
				height: 50vh;
				margin: 0 auto 110px;
				border: 3px solid black;
				padding: 40px;
			}
			#deck div{
				border: 3px solid black;
				height: 30vh;
				width: 20vw;
				background-color: white;
				color: red;
				font-size: 2em;
				padding: 5px;
				font-weight: bold;
				position: fixed;
				top: 10vh;
				left: 50vw;
				transition: transform 1s;
			}
			#deck div:hover{
				border: 3px solid #0C2C55;
			}
			#deck:hover div:first-child{
				transform: translate(-125px, -95px) rotate(-45deg);
			}
			#deck:hover div:nth-child(2){
				transform: translate(-85px, -70px) rotate(-30deg);
			}
			#deck:hover div:nth-child(3){
				transform: translate(-45px, -45px) rotate(-15deg);
			}
			#deck:hover div:nth-child(5){
				transform: translate(25px, 60px) rotate(15deg);
			}
			#deck div:first-child:hover{
				background-color: #1A3263;
			}
			#deck div:nth-child(2):hover{
				background-color: #547792;
			}
			#deck div:nth-child(3):hover{
				background-color: #2C687B;
			}
			#deck div:nth-child(4):hover{
				background-color: #8CC7C4;
			}
			#deck div:nth-child(5):hover{
				background-color: #DB1A1A;
			}
			a {
				text-decoration: none;
			}
			button {
				display: block;
				width: 25vw;
				padding: 5px;
				margin: 10px auto;
			}
		</style>
	</head>
	<body>
		<div id="deck">
			<div> &#128513;</div>
			<div> &#128540;</div>
			<div>	&#128018;</div>
			<div>	👨‍👩‍👧‍👦 </div>
      <div> &#127881;</div>
		</div>
    <a href="../index.html"><button> Click me for Home</button> </a>
	</body>
</html>

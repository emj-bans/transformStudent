<!DOCTYPE html>
<html>
	<head>
		<title>Transition and Animation Exercises</title>
		<meta charset="UTF-8">
    	<meta name="description" content="Sample Code to implement transform and transition">
	    <meta name="author" content="A.L. Mendoza & M.Tarcelo">
	    <meta name="revised" content="12/04/2022">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<style>
     	 	* {box-sizing: border-box}
			div{
				transition: all 0.5s;
			}
			
			#roll{
				width: 400px;
				height: 400px;
				margin: 30px auto;
			}
			#roll img{
				width: 600px;
        		height: 800px;
        		opacity: 0.75;
			}
      		#roll img:hover{
				opacity: 1;
			}
			#roll div{
				position: fixed;
				width: 200px;
				height: 200px;
			}
			#roll:hover div:first-of-type{
				transform: skew(-40deg, 0deg);
      			transform-origin: top ;
			}
			#roll:hover div:nth-of-type(2){
				transform: skew(40deg, 0deg);
      			transform-origin: top ;
			}
			#roll:hover div:nth-of-type(3){
				transform: skew(40deg, 0deg);
      			transform-origin: bottom ;
			}
			#roll:hover div:last-of-type{
				transform: skew(-40deg, 0deg);
      			transform-origin: bottom ;
			}

			#roll div:first-of-type{
				background-color: red;
				top:30px;
			}
			#roll div:nth-of-type(2){
				background-color: yellow;
				top:30px;
				left:50vw;
				}
			#roll div:nth-of-type(3){
				background-color: blue;
				top:230px;
			}
			#roll div:last-of-type{
 				background-color: green;
				 top:230px;
				 left:50vw;
			}
			p {
				text-align: center;
			}
		</style>
	</head>
	<body>
		<div id="roll">
			<p><a href="../index.html"> 
        <img src="https://tse4.mm.bing.net/th/id/OIP._0VtuxoHTa2YWcoSSPTK4QHaIA?rs=1&pid=ImgDetMain&o=7&rm=3"/>
      </a>
      </p>
			<div></div>
			<div></div>
			<div></div>
			<div></div>
		</div>
    <p>Click on the Image for Home<br/>
    Source: https://www.ba-bamail.com/cute-overload/75-of-the-cutest-kittens-in-the-world/
    </p>
    
	</body>
</html>
